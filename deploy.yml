---
- name: "Apache installation using docker"
  hosts: prod
  become: true
  vars_files:
    - files/secrets/credentials.yml
  pre_tasks:
    - name: Install EPEL repo
      package: name=epel-release state=present
      when: ansible_distribution == "CentOS"

    - name: Download pip script
      get_url:
        url: https://bootstrap.pypa.io/pip/3.6/get-pip.py
        dest: /tmp/get-pip.py

    - name: Install python-pip
      ansible.builtin.command: python3 /tmp/get-pip.py

    - name: Install docker python
      pip: name=docker-py

    - name : Install git and wget
      package: name={{ item }} state=present
      loop:
        - git
        - wget
      when: ansible_distribution == "CentOS" and ansible_os_family == "RedHat"
  tasks:
    - name: Copy website file template
        template:
          src: index.html.j2
          dest: /home/admin/index.html
    - name: Create Apache container
      community.docker.docker_container:
        name: webapp
        image: httpd
        state: started
        ports:
          - "8081:80"
        volumes: 
         - /home/admin/index.html:/usr/local/apache2/htdocs/index.html